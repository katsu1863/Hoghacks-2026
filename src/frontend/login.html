<!--
File Name: login.html
Description: Login page for MyScene. Takes username and password, verifies with backend, and redirects to main.html on success.
-->

<!DOCTYPE html>
<html lang="en">
<head><link rel="stylesheet" href="style.css"></head>
<title>Login - MyScene</title>

<header>
    <a href="main.html">
        <img src="Icons/mySceneLogo.png" class="logo">
    </a>
</header>

<body>

    <div class="login-container">
        <div class="login-box">
            <h1>Login</h1>
            <form id="loginForm" onsubmit="event.preventDefault();">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>
                </div>
                
                <button type="button" id="login">Login</button>
            </form>
        </div>
    </div>

    <script src="login.js"></script>
</body>


<footer>
    <p>Created by Theta Protocol, Hoghacks Hackathon 2026 Team.</p>
</footer>
</html>
