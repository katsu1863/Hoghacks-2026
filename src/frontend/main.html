<head><link rel="stylesheet" href="style.css"></head>
<title>MyScene</title>

<header>
    <h1 class="logo">MyScene</h1>

    <!-- This is the search engine. -->
    <form class="searchEngine"> 

        <!-- Top of the search bar -->
        <div class="searchEngineTop">
            <input for="searchEngine" id="homeSearch">
            <button id="searchButton"><img src="Icons/search-circle-svgrepo-com.svg" id="searchButton"></button>
        </div>

        <!-- Bottom of the search bar -->
        <div class="searchEngineBot">
            <button id="filterButton">Filter ></button>
            <!-- Filter options are hidden so they can later be revealed by JS. -->
            <div id="filterOptions" style="display: none;"></div>
        </div>
        
    </form>
    

</header>

<body>
