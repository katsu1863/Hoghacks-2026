<head><link rel="stylesheet" href="style.css"></head>
<title>My Scene - Add Artist</title>

<header>
    <div class="nav id="addArtistNav">
        <button style="width: 6em;" id="goBackButton" class="navButton">
            <a href="main.html" >Go Back</a>
        </button>

        <button id="loginButton" class="navButton">
            <a href="login.html">Log In</a>
        </button>
    </div>

    <a href="main.html">
        <img src="Icons/mySceneLogo.png" class="logo" id="smallLogo">
    </a>
</header>

<body>
    <h1>Ready to add grow your community? Add Your Band!</h1>

    <!-- This is where the user can add their band! -->
    <form id="bandSubmission">

        <!-- Name of Band  -->
        <label>Name of Band: </label>
        <input for="bandName" id="bandName">

        <!-- Instagram Handle of Band  -->
        <label>Instagram Handle: </label>
        <input for="instagramHandle" id="instagramHandle">

        <!-- Band Genre  -->
        <label>Genre of Band: </label>
        <input for="bandGenre" id="bandGenre">

        <!-- City Location of Band  -->
        <label>City Location: </label>
        <input for="bandCity" id="bandCity">

        <!-- State Location of Band  -->
        <label>State Location: </label>
        <input for="bandState" id="bandState">
        
        <!-- Submit Button -->
         <button id="addBandButton">Add!</button>
    </form>

</body>

<script src="addArtist.js"></script>
